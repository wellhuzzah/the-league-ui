<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rockwood — Pixel Art Direction</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="scene.jsx"></script>
  <script type="text/babel" src="mocks.jsx"></script>
  <script type="text/babel">
    /* global React, ReactDOM, DesignCanvas, DCSection, DCArtboard,
              MenuA, MenuB, PlacardStandings,
              TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakToggle, TweakSlider */
    const { useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "scanlines": true,
      "vignette": true,
      "chroma": true,
      "fireflies": false,
      "blink": true
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Apply tweaks globally via root style
      useEffect(() => {
        const css = `
          ${t.scanlines ? '' : '.scene .scanlines { display: none !important; }'}
          ${t.vignette  ? '' : '.scene .crt-vignette { display: none !important; }'}
          ${t.chroma    ? '' : '.scene .chroma { display: none !important; }'}
          ${t.fireflies ? '' : '.scene .firefly { display: none !important; }'}
          ${t.blink     ? '' : '.tower-light { animation: none !important; }'}
        `;
        let s = document.getElementById('__tweak-style');
        if (!s) {
          s = document.createElement('style');
          s.id = '__tweak-style';
          document.head.appendChild(s);
        }
        s.textContent = css;
      }, [t.scanlines, t.vignette, t.chroma, t.fireflies, t.blink]);

      return (
        <>
          <DesignCanvas title="Rockwood · Pixel Art Direction" subtitle="2 main-menu directions + 1 inner-page placard">
            <DCSection id="menu" title="Main Menu — pick a direction">
              <DCArtboard id="menu-a" label="A · Into the Breach (silhouette · asymmetric)" width={1280} height={720}>
                <MenuA />
              </DCArtboard>
              <DCArtboard id="menu-b" label="B · Graveyard Keeper (lit diorama · centered)" width={1280} height={720}>
                <MenuB />
              </DCArtboard>
            </DCSection>
            <DCSection id="inner" title="Inner page — Diorama vs Detached">
              <DCArtboard id="diorama" label="Diorama · tower stays in frame, placard floats over the scene (best for narrative pages)" width={1280} height={720}>
                <PlacardDiorama />
              </DCArtboard>
              <DCArtboard id="detached" label="Detached · placard fills the screen, tower implied via texture (best for data-heavy pages)" width={1280} height={720}>
                <PlacardStandings />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection title="CRT atmosphere">
              <TweakToggle label="Scanlines"          value={t.scanlines} onChange={v => setTweak('scanlines', v)} />
              <TweakToggle label="CRT vignette"       value={t.vignette}  onChange={v => setTweak('vignette',  v)} />
              <TweakToggle label="Chromatic edges"    value={t.chroma}    onChange={v => setTweak('chroma',    v)} />
            </TweakSection>
            <TweakSection title="Ambient">
              <TweakToggle label="Fireflies"          value={t.fireflies} onChange={v => setTweak('fireflies', v)} />
              <TweakToggle label="Blinking aircraft light" value={t.blink} onChange={v => setTweak('blink',    v)} />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
