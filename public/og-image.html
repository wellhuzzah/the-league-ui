<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Pixelify+Sans:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  width: 1200px;
  height: 630px;
  overflow: hidden;
  background: #0a0820;
  position: relative;
}

.sky {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    #0a0820  0%,
    #14102e 18%,
    #251c45 38%,
    #4a2654 58%,
    #6a2f4d 72%,
    #c4533a 86%,
    #f0a04b 100%
  );
}

/* Scale the image down then back up to force pixelation */
.photo-wrap {
  position: absolute; inset: 0;
  overflow: hidden;
}
.photo-wrap img {
  display: block;
  width: 200px;
  height: 105px;
  transform: scale(6);
  transform-origin: 0 0;
  object-fit: cover;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  opacity: 0.88;
  filter: saturate(0.52) brightness(0.68) contrast(1.18);
}

/* Left-side gradient so title reads cleanly */
.left-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    90deg,
    rgba(7,6,26,0.90)  0%,
    rgba(7,6,26,0.72) 28%,
    rgba(7,6,26,0.12) 56%,
    transparent        70%
  );
  z-index: 10;
}

/* Bottom gradient to keep footer legible */
.bottom-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    to top,
    rgba(7,6,26,0.70) 0%,
    transparent 22%
  );
  z-index: 10;
}

/* Window lights */
.light {
  position: absolute;
  width: 4px; height: 5px;
  background: rgba(255,200,80,0.62);
  box-shadow: 0 0 5px 2px rgba(255,175,45,0.38);
  z-index: 12;
  pointer-events: none;
}

/* ── Title block ── */
.title-block {
  position: absolute;
  left: 80px;
  top: 108px;
  z-index: 20;
}

.title-est {
  font-family: 'Silkscreen', monospace;
  font-size: 13px;
  color: #f0a04b;
  letter-spacing: 7px;
  margin-bottom: 18px;
}

.title-main {
  font-family: 'Silkscreen', monospace;
  font-weight: 700;
  color: #f4eedd;
  font-size: 94px;
  letter-spacing: 5px;
  line-height: 0.91;
  text-shadow:
    0    0   0 #f4eedd,
    -2px 0   0 #f4eedd,
     2px 0   0 #f4eedd,
    0   -2px 0 #f4eedd,
    0    2px 0 #f4eedd,
    -3px 3px 0 #6a2f4d,
    -4px 4px 0 #2a1f4a,
    -6px 6px 0 #14102e;
}

.title-sub {
  font-family: 'Pixelify Sans', monospace;
  font-weight: 700;
  color: #f4eedd;
  font-size: 34px;
  letter-spacing: 9px;
  margin-top: 8px;
  text-shadow: -2px 2px 0 #2a1f4a;
}

.title-desc {
  font-family: 'Silkscreen', monospace;
  font-size: 11px;
  color: #7a8090;
  letter-spacing: 3px;
  margin-top: 30px;
  line-height: 1.9;
}

/* ── Footer ── */
.footer {
  position: absolute;
  left: 80px; right: 80px; bottom: 26px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  font-family: 'Silkscreen', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  color: #c0b8a0;
  z-index: 60;
}

.footer .lbl { color: #f0a04b; margin-right: 6px; }

/* CRT effects */
.scanlines {
  position: absolute; inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0.0)   0px,
    rgba(0,0,0,0.0)   2px,
    rgba(0,0,0,0.20)  3px,
    rgba(0,0,0,0.0)   4px
  );
  mix-blend-mode: multiply;
  z-index: 90;
}

.vignette {
  position: absolute; inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.55) 100%);
  z-index: 91;
}

.chroma {
  position: absolute; inset: 0;
  pointer-events: none;
  background: linear-gradient(90deg, rgba(255,40,40,0.05), transparent 5%, transparent 95%, rgba(40,200,255,0.05));
  mix-blend-mode: screen;
  z-index: 92;
}
</style>
</head>
<body>
  <div class="sky"></div>

  <div class="photo-wrap">
    <img src="tower_wide.jpg" alt="">
  </div>

  <div class="left-overlay"></div>
  <div class="bottom-overlay"></div>

  <!-- Window lights (same clusters as homepage) -->
  <div class="light" style="left:33.2%; top:38.4%"></div>
  <div class="light" style="left:33.8%; top:37.9%"></div>
  <div class="light" style="left:34.5%; top:38.6%"></div>
  <div class="light" style="left:36.4%; top:36.1%"></div>
  <div class="light" style="left:37.1%; top:35.7%"></div>
  <div class="light" style="left:39.2%; top:34.2%"></div>
  <div class="light" style="left:39.9%; top:34.8%"></div>
  <div class="light" style="left:40.6%; top:34.1%"></div>
  <div class="light" style="left:41.3%; top:34.6%"></div>
  <div class="light" style="left:42.8%; top:37.5%"></div>
  <div class="light" style="left:43.5%; top:37.0%"></div>
  <div class="light" style="left:44.2%; top:37.8%"></div>
  <div class="light" style="left:44.8%; top:37.3%"></div>
  <div class="light" style="left:46.5%; top:30.2%"></div>
  <div class="light" style="left:47.2%; top:29.8%"></div>
  <div class="light" style="left:47.9%; top:30.5%"></div>
  <div class="light" style="left:49.3%; top:42.1%"></div>
  <div class="light" style="left:50.0%; top:41.6%"></div>
  <div class="light" style="left:50.7%; top:42.4%"></div>

  <div class="title-block">
    <div class="title-est">· EST. 2005 ·</div>
    <div class="title-main">ROCKWOOD</div>
    <div class="title-sub">THE LEAGUE</div>
    <div class="title-desc">
      Records &nbsp;·&nbsp; Standings &nbsp;·&nbsp; Draft History<br>
      Head to Head &nbsp;·&nbsp; Team Pages
    </div>
  </div>

  <div class="footer">
    <div><span class="lbl">URL:</span> theleague.letsfriggen.party</div>
    <div><span class="lbl">SEASON:</span> 2025</div>
  </div>

  <div class="scanlines"></div>
  <div class="vignette"></div>
  <div class="chroma"></div>
</body>
</html>
